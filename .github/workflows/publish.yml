name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Configure DeepSeek API key for tests
        run: |
          mkdir -p ~/.yu
          echo "{\"apiKeys\":{\"deepseek\":\"${{ secrets.DEEPSEEK_API_KEY }}\"}}" > ~/.yu/config.json
      - run: bun test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=$(bun -e "console.log(require('./package.json').version)")" >> "$GITHUB_OUTPUT"
            echo "TAG=latest" >> "$GITHUB_OUTPUT"
          else
            BASE=$(bun -e "console.log(require('./package.json').version.replace(/-beta\.\d+$/, ''))")
            echo "VERSION=${BASE}-beta.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "TAG=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        run: bun -e "const p = require('./package.json'); p.version = '${{ steps.version.outputs.VERSION }}'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n')"

      - name: Build
        run: bun run build

      - name: Configure registry
        run: |
          cat > .npmrc << 'EOF'
          @saltfish001:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          EOF

      - name: Publish to GitHub Packages via Bun
        run: bun publish --tag "${{ steps.version.outputs.TAG }}"
