name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Configure DeepSeek API key for tests
        run: |
          mkdir -p ~/.yu
          echo "{\"apiKeys\":{\"deepseek\":\"${{ secrets.DEEPSEEK_API_KEY }}\"}}" > ~/.yu/config.json
      - run: bun test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@saltfish001'

      - run: bun install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=$(bun -e "console.log(require('./package.json').version)")" >> "$GITHUB_OUTPUT"
            echo "TAG=latest" >> "$GITHUB_OUTPUT"
          else
            BASE=$(bun -e "console.log(require('./package.json').version.replace(/-beta\.\d+$/, ''))")
            echo "VERSION=${BASE}-beta.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "TAG=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        run: npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version

      - name: Build
        run: bun run build

      - name: Publish to GitHub Packages
        run: npm publish --tag "${{ steps.version.outputs.TAG }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
