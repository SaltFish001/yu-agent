name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Configure DeepSeek API key for tests
        run: |
          mkdir -p ~/.yu
          echo "{\"apiKeys\":{\"deepseek\":\"${{ secrets.DEEPSEEK_API_KEY }}\"}}" > ~/.yu/config.json
      - run: bun test
