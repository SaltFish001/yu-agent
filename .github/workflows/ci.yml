name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Configure DeepSeek API key for tests
        run: |
          mkdir -p ~/.yu
          echo "{\"apiKeys\":{\"deepseek\":\"${{ secrets.DEEPSEEK_API_KEY }}\"}}" > ~/.yu/config.json
      - run: npm test
