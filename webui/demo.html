<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yu-agent</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="sidebar-header-top">
        <h1>yu</h1>
        <span class="version" id="version-label">v0.1.0</span>
      </div>
      <div id="status-badge" class="disconnected">
        <span class="indicator"></span>
        <span id="ws-status">离线</span>
      </div>
    </div>

    <div id="sidebar-body">
      <div class="sidebar-section">
        <h2>系统</h2>
        <div class="stat-row"><span class="stat-label">Uptime</span><span class="stat-value" id="uptime-val">-</span></div>
        <div class="stat-row"><span class="stat-label">RSS</span><span class="stat-value" id="mem-val">-</span></div>
      </div>
      <div class="sidebar-section">
        <h2>主题 <span class="section-count" id="topics-count"></span></h2>
        <div id="topic-list" class="list-collapse"><span class="sidebar-hint">加载中...</span></div>
      </div>

      <div class="sidebar-section">
        <h2>WebSocket</h2>
        <div class="stat-row"><span class="stat-label">状态</span><span id="ws-detail-status" class="stat-value">-</span></div>
        <div class="stat-row"><span class="stat-label">客户端</span><span id="ws-detail-clients" class="stat-value">-</span></div>
        <div class="stat-row"><span class="stat-label">消息</span><span id="ws-detail-msgs" class="stat-value">-</span></div>
        <div class="stat-row"><span class="stat-label">WS 运行</span><span id="ws-detail-uptime" class="stat-value">-</span></div>
      </div>
      <div class="sidebar-section">
        <h2>规则 <span class="section-count" id="rules-count"></span></h2>
        <div id="rule-list" class="list-collapse"><span class="sidebar-hint">暂无规则</span></div>
      </div>
      <div class="sidebar-section">
        <h2>工具 <span class="section-count" id="tools-count"></span></h2>
        <div id="tool-list" class="list-collapse"><span class="sidebar-hint">等待数据...</span></div>
      </div>
      <div class="sidebar-section">
        <h2>记忆 <span class="section-count" id="memories-count"></span></h2>
        <div id="mem-list" class="list-collapse"><span class="sidebar-hint">等待数据...</span></div>
      </div>
      <div class="sidebar-section sidebar-toggle-section">
        <button id="btn-clear" class="sidebar-btn" title="清空对话">🗑 清空</button>
        <button id="btn-new" class="sidebar-btn" title="新对话">✕ 新对话</button>
      </div>
    </div>

    <div id="sidebar-footer">
      <div class="stat-row">
        <span class="stat-label">请求</span>
        <span class="stat-value" id="stats-reqs">0</span>
      </div>
      <button id="term-toggle-btn" class="sidebar-btn term-toggle" title="Toggle terminal">
        <span class="term-toggle-icon">$_</span>
        <span class="term-toggle-label">终端</span>
      </button>
    </div>
  </aside>

  <!-- Terminal Panel -->
  <div id="terminal-panel" class="hidden">
    <div id="term-header">
      <div id="term-tab-bar">
        <!-- tabs inserted by JS -->
        <button id="term-new-btn" class="term-new-btn" title="New terminal (+)" style="margin-left:auto">+</button>
        <button id="term-close-btn" class="term-close-panel" title="Close panel">×</button>
      </div>
    </div>
    <div id="term-containers"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="chat" role="log" aria-label="对话"></div>

    <div id="suggestions">
      <button class="suggestion-btn" data-cmd="help">💡 帮助</button>
      <button class="suggestion-btn" data-cmd="doctor">🔍 诊断</button>
      <button class="suggestion-btn" data-cmd="topic list">📋 话题</button>
      <button class="suggestion-btn" data-cmd="status">📊 状态</button>
    </div>

    <div id="input-bar">
      <input id="message-input" type="text" placeholder="输入消息..." autofocus />
      <button id="send-btn">发送</button>
    </div>
  </div>
</div>

<script src="/assets/client.js"></script>
</body>
</html>
